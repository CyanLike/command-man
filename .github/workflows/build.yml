name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        architecture: [x64, ARM64]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build, test, and package
        shell: pwsh
        run: ./scripts/build.ps1 -Architecture ${{ matrix.architecture }}

      - uses: actions/upload-artifact@v7
        with:
          name: CommandMan-${{ matrix.architecture }}
          path: artifacts/CommandMan-${{ matrix.architecture }}.zip
          if-no-files-found: error
